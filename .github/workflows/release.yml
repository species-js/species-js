name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Install pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create release PR (publish disabled until first manual bootstrap)
        uses: changesets/action@e4156907cdd269dcaa37f03263be504a3570994d # v1.6.0
        with:
          version: pnpm changeset version
          # publish: pnpm changeset publish
          #
          # The `publish` input is intentionally disabled.
          #
          # changesets/action's behavior when `publish` is set AND no changesets
          # are pending is to fall back to "publish any unpublished packages to
          # npm" — which fails with E404 on a fresh monorepo where no version
          # has ever been pushed to the registry, and breaks every release-
          # workflow run until the bootstrap publish happens.
          #
          # Re-enable this line (and set the NPM_TOKEN repo secret) when you
          # are ready to publish the first real release. Until then, this
          # workflow only opens "Version Packages" PRs from pending changesets.
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
