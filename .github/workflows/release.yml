name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create release PR (publish disabled until first manual bootstrap)
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          # publish: pnpm changeset publish
          #
          # The `publish` input is intentionally disabled.
          #
          # changesets/action's behavior when `publish` is set AND no changesets
          # are pending is to fall back to "publish any unpublished packages to
          # npm" — which fails with E404 on a fresh monorepo where no version
          # has ever been pushed to the registry, and breaks every release-
          # workflow run until the bootstrap publish happens.
          #
          # Re-enable this line (and set the NPM_TOKEN repo secret) when you
          # are ready to publish the first real release. Until then, this
          # workflow only opens "Version Packages" PRs from pending changesets.
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
