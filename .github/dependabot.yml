version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    versioning-strategy: 'increase'
    # Suppress semver-major bumps for dependencies that are pinned by design.
    # Minor and patch updates within each pinned major still flow through.
    #
    # - `@types/node`: pinned to the major matching `engines.node`. Bumping past
    #   the engines floor would expose Node API types that don't exist at runtime
    #   on the supported Node major, turning typecheck-pass into runtime-fail.
    # - `vite`: pinned to ^7 to avoid Vite 8's Rolldown bundler, which triggers a
    #   Rust panic ("memory allocation of N bytes failed") on the macos-latest
    #   GHA runner. Re-evaluate when Rolldown stabilises on macOS — see the
    #   scheduled "vite-rolldown-recheck" reminder.
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'vite'
        update-types:
          - 'version-update:semver-major'
    groups:
      prod-deps:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      dev-deps:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    commit-message:
      # Hard-code the `(deps)` scope for both prod and dev so PR titles
      # match the commitlint scope-enum. `include: 'scope'` would otherwise
      # append `(deps-dev)` to dev-dep PRs — which is not in scope-enum
      # (consolidated into `deps` per SCAFFOLD.md → Commitlint scopes).
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps)'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'
      include: 'scope'
