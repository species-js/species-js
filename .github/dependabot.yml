version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    versioning-strategy: 'increase'
    # `@types/node` is pinned to the major matching `engines.node` in package.json.
    # Bumping past the engines floor would expose Node API types that don't exist at
    # runtime on the supported Node major, turning typecheck-pass into runtime-fail.
    # Minor and patch updates within the supported major still flow through.
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
    groups:
      prod-deps:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      dev-deps:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'
      include: 'scope'
