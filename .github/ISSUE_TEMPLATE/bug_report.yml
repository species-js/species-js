name: Bug report
description: Report a defect in published behavior
labels: [bug]
body:
  - type: input
    id: package
    attributes:
      label: Affected package
      placeholder: '@species-js/type-detection'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: '0.1.0'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A code snippet or repository link demonstrating the issue.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, and browser (if applicable).
      placeholder: |
        Node: 22.x
        OS: macOS 14
        Browser: n/a
    validations:
      required: false
