name: Feature request
description: Propose a new capability or contract change
labels: [enhancement]
body:
  - type: input
    id: package
    attributes:
      label: Target package
      placeholder: '@species-js/type-detection (or new package)'
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-visible problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: A sketch of the API surface, naming, or invariants.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
